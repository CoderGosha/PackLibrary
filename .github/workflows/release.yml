name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip archive
        run: zip -r packlibrary.zip en ru manifest.json

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: packlibrary.zip
